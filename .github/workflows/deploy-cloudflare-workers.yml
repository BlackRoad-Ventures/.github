name: 🌩️ Deploy Cloudflare Workers

on:
  workflow_dispatch:
    inputs:
      worker:
        description: 'Worker to deploy'
        required: false
        default: 'agents'
        type: choice
        options:
          - agents
          - all
  push:
    branches: [master]
    paths:
      - 'workers/blackroad-agents/**'

jobs:
  deploy-agents:
    name: 🚀 Deploy blackroad-agents Worker
    runs-on: [self-hosted, blackroad-fleet, octavia]
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 848cf0b18d51e0170e0d1537aec3505a
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Build & Deploy agents worker
        working-directory: workers/blackroad-agents
        run: |
          export PATH=$HOME/npm-global/bin:$HOME/bin:$PATH
          node --version && npm --version
          npm install --silent
          wrangler deploy --config wrangler.toml
          echo "✅ blackroad-agents worker deployed"

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://blackroad-agents.blackroad.workers.dev/)
          echo "Worker HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ] && echo "✅ Worker responding" || echo "⚠️ Worker may be starting up"
